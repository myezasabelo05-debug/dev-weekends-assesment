<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Habit Tracker</title>

  <!-- ✅ CORRECT CSS LINK -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Habit Tracker</h1>

    <div class="add">
      <input id="habitInput" placeholder="Add a habit">
      <button id="addBtn">Add</button>
    </div>

    <div class="controls">
      <button id="prevBtn">←</button>
      <button id="todayBtn">This Week</button>
      <button id="nextBtn">→</button>
    </div>

    <div id="grid"></div>
  </div>

  <!-- ✅ CORRECT JS LINK -->
  <script src="script.js"></script>

</body>
</html>
